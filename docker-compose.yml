services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://favorites:favorites@postgres:5432/favorites
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr:8000}
      OCR_SERVICE_API_KEY: ${OCR_SERVICE_API_KEY:-}
      ASR_SERVICE_URL: ${ASR_SERVICE_URL:-http://asr:8000}
      ASR_SERVICE_API_KEY: ${ASR_SERVICE_API_KEY:-}
    volumes:
      - telegram_files:/app/data/storage
    healthcheck:
      test: ["CMD", "node", "dist/app/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: favorites
      POSTGRES_USER: favorites
      POSTGRES_PASSWORD: favorites
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U favorites -d favorites"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ocr:
    profiles:
      - ocr
    build:
      context: docker/ocr-service
    environment:
      PADDLEOCR_RECOGNITION_MODEL: ${PADDLEOCR_RECOGNITION_MODEL:-eslav_PP-OCRv5_mobile_rec}
      PADDLEOCR_DETECTION_MODEL: ${PADDLEOCR_DETECTION_MODEL:-PP-OCRv5_mobile_det}
      PADDLEOCR_DEVICE: ${PADDLEOCR_DEVICE:-cpu}
      MODEL_IDLE_UNLOAD_SECONDS: ${OCR_MODEL_IDLE_UNLOAD_SECONDS:-60}
      OCR_SERVICE_API_KEY: ${OCR_SERVICE_API_KEY:-}
    volumes:
      - ocr_models:/models
    restart: unless-stopped

  asr:
    profiles:
      - asr
    build:
      context: docker/asr-service
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ru}
      MODEL_IDLE_UNLOAD_SECONDS: ${ASR_MODEL_IDLE_UNLOAD_SECONDS:-60}
      ASR_SERVICE_API_KEY: ${ASR_SERVICE_API_KEY:-}
    volumes:
      - asr_models:/models
    restart: unless-stopped

volumes:
  postgres_data:
  telegram_files:
  ocr_models:
  asr_models:
